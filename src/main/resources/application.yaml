# 通用配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/task_incentive?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: task-persist-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: manual

server:
  port: 8080
  connection-timeout: 3s
  tomcat:
    threads:
      max: 300
      min-spare: 30
    max-connections: 8192
    accept-count: 1000
    keep-alive-timeout: 20s
    max-keep-alive-requests: 1000

app:
  security:
    admin:
      username: admin
      password: admin123
  executors:
    task-engine-event:
      core-pool-size: 32
      max-pool-size: 128
      queue-capacity: 20000
      keep-alive-seconds: 60
      thread-name-prefix: task-engine-event-
  dlq:
    topic: dlq-topic
    custom-js: /swagger-ui-request-interceptor.js

# 通用管理端点配置（仅健康和信息）
management:
  endpoints:
    web:
      exposure:
        include: 'health,info'
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.9,0.95,0.99

# 环境专属配置请放到 application-dev.yaml 和 application-prod.yaml
