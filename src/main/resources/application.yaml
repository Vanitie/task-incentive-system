# 通用配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/task_incentive?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: task-persist-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: manual

server:
  port: 8080
  connection-timeout: 3s
  tomcat:
    threads:
      max: 300
      min-spare: 30
    max-connections: 8192
    accept-count: 1000
    keep-alive-timeout: 20s
    max-keep-alive-requests: 1000

app:
  security:
    admin:
      username: admin
      password: admin123
  executors:
    task-engine-event:
      core-pool-size: 32
      max-pool-size: 128
      queue-capacity: 20000
      keep-alive-seconds: 60
      thread-name-prefix: task-engine-event-
  dlq:
    topic: dlq-topic
    custom-js: /swagger-ui-request-interceptor.js
  cache-warmup:
    enabled: true
    fail-fast: false
    load-risk: true
    load-task-config: true
    load-hot-users: true
    task-config-batch-size: 500
    task-config-redis-ttl-seconds: 3600
    hot-user-limit: 1000
    instances-per-hot-user: 30
    max-total-hot-user-instances: 30000
    user-task-redis-ttl-minutes: 120
  log-control:
    main-path-enabled: ${APP_MAIN_PATH_LOG_ENABLED:true}
  async-compensation:
    dlq-on-kafka-failure: ${APP_DLQ_ON_KAFKA_FAILURE:true}

# 通用管理端点配置（仅健康和信息）
management:
  endpoints:
    web:
      exposure:
        include: 'health,info'
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.9,0.95,0.99

logging:
  file:
    # Use APP_LOG_FILE to override at runtime, e.g. D:/logs/task-incentive-system.log
    name: ${APP_LOG_FILE:./logs/task-incentive-system.log}
  level:
    root: ${APP_ROOT_LOG_LEVEL:INFO}
    com.whu.graduation.taskincentive: ${APP_LOG_LEVEL:INFO}
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      file-name-pattern: ${APP_LOG_FILE_PATTERN:./logs/task-incentive-system.%d{yyyy-MM-dd}.%i.log.gz}
      max-file-size: 100MB
      total-size-cap: 2GB
      max-history: 14

# 环境专属配置请放到 application-dev.yaml 和 application-prod.yaml
